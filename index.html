<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pergamino Misterioso</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Cinzel', serif;
        }

        #contenedor-principal {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 90vh;
            cursor: pointer;
        }

        .elemento-capa {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #img-cerrada { z-index: 5; display: block; }
        #video-transicion { display: none; z-index: 4; }

        #capa-final {
            display: none;
            z-index: 3;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* Cuadro de texto */
        #texto-usuario {
            position: absolute;
            bottom: 12%; 
            left: 10%;
            width: 80%;
            height: 14%;
            background-color: #000; 
            border: 1px solid #333;
            color: #d4af37;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            text-transform: uppercase;
        }

        /* BOTÓN: Fondo blanco, letra negra, sobre la línea roja */
        #btn-desencriptar {
            position: absolute;
            bottom: 13%; 
            right: 11%;  
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 5px 15px;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            z-index: 10;
        }

        #btn-desencriptar:hover { background-color: #e0e0e0; }

        /* MODAL DE ÉXITO */
        #overlay-bloqueo {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 99;
        }

        #modal-exito {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 380px;
            background: #f4e4bc;
            border: 8px double #8b4513;
            padding: 25px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #modal-exito h2 { color: #8b0000; margin: 0 0 15px 0; }
        #modal-exito p { color: #3e2723; font-weight: bold; font-size: 1.1rem; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="contenedor-principal" onclick="iniciar()">
        <img src="pergamino_sellado.png" id="img-cerrada" class="elemento-capa">

        <video id="video-transicion" class="elemento-capa" playsinline>
            <source src="transicion.mp4" type="video/mp4">
        </video>

        <div id="capa-final" class="elemento-capa">
            <img src="fffffffffffffffffffffff.png" class="elemento-capa">
            
            <textarea id="texto-usuario" placeholder="TU RESPUESTA AQUÍ..."></textarea>
            <button id="btn-desencriptar" onclick="verificarRespuesta(event)">Desencriptar</button>
        </div>
    </div>

    <div id="overlay-bloqueo"></div>
    <div id="modal-exito">
        <h2>📜 ¡INVITACIÓN REVELADA!</h2>
        <p id="mensaje-invitacion"></p>
        <button onclick="location.reload()" style="margin-top: 20px; cursor: pointer; padding: 8px 20px; font-family: 'Cinzel';">Cerrar</button>
    </div>

    <script>
        const video = document.getElementById('video-transicion');
        const imgCerrada = document.getElementById('img-cerrada');
        const capaFinal = document.getElementById('capa-final');

        function iniciar() {
            if (imgCerrada.style.display === 'none') return;
            imgCerrada.style.display = 'none';
            video.style.display = 'block';
            video.play().catch(e => console.log("Error video:", e));

            video.onended = () => {
                video.style.display = 'none';
                capaFinal.style.display = 'block';
                setTimeout(() => { capaFinal.style.opacity = '1'; }, 50);
            };
        }

  function verificarRespuesta(e) {
    e.stopPropagation(); 
    
    // 1. Capturamos el valor del textarea
    let input = document.getElementById('texto-usuario').value;

    // 2. FUNCIÓN DE LIMPIEZA EXTREMA
    function limpiar(texto) {
        return texto
            .normalize("NFD")                          // Descompone tildes (Á -> A + ´)
            .replace(/[\u0300-\u036f]/g, "")           // Borra los tildes
            .toUpperCase()                             // Todo a Mayúsculas
            .replace(/\r?\n|\r/g, " ")                // Convierte cualquier tipo de Enter en espacio
            .replace(/\s+/g, " ")                      // Convierte múltiples espacios en uno solo
            .trim();                                   // Quita espacios al inicio y al final
    }

    const respuestaUsuario = limpiar(input);
    const objetivo = "SABADO 18 ABRIL VENIR CASA EMI NOCHE 21HS";

    // DEBUG: Esto te permite ver en la consola (F12) qué está entendiendo la PC
    console.log("Usuario escribió:", respuestaUsuario);
    console.log("Objetivo:", objetivo);

    if (respuestaUsuario === objetivo) {
        document.getElementById('overlay-bloqueo').style.display = 'block';
        document.getElementById('modal-exito').style.display = 'block';
        document.getElementById('mensaje-invitacion').innerText = "Invitación desencriptada. Sabado 18/4 21hs en la casa de Emi. Confirmar asistencia o los dioses te van a castigar (?)";
    } else {
        // Mensaje de ayuda si le falta un pedazo
        if (respuestaUsuario.length < objetivo.length && respuestaUsuario.length > 5) {
            alert("El mensaje parece incompleto... Creo que no es ese");
        } else {
            alert("Las runas no coinciden. Deberías revisar mejor.");
        }
    }
}
    </script>
</body>
</html>
